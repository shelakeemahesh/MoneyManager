# ========================
# SERVER
# ========================
server.port=${PORT:8080}
server.servlet.context-path=/api/v1.0
# Render needs the app to bind to 0.0.0.0 (not just localhost)
server.address=0.0.0.0

# ========================
# DATASOURCE (PostgreSQL)
# ========================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool — tuned for Render free-tier (limited connections)
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:5}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
# Eagerly initialize the pool at startup instead of lazily on first query
spring.datasource.hikari.initialization-fail-timeout=0

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
# Disable SQL logging in production (override in application-dev.properties)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ========================
# JWT
# ========================
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:604800000}

# ========================
# CORS
# ========================
# Set APP_CORS_ALLOWED_ORIGINS in production (comma-separated list).
# The default value covers local development only.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000}

# ========================
# APP
# ========================
app.base-url=${APP_BASE_URL}

# ========================
# MAIL (Brevo / SMTP)
# ========================
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_USERNAME}
spring.mail.password=${BREVO_PASSWORD}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.from=${BREVO_USERNAME:noreply@example.com}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ========================
# LOGGING (production)
# ========================
# Root level INFO — no DEBUG/TRACE SQL in production
logging.level.root=INFO
logging.level.in.maheshshelakee.moneymanager=INFO
# Suppress noisy Hibernate startup logs
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN

# ========================
# STARTUP OPTIMISATION
# ========================
# Disable JMX (not useful in containers/Render)
spring.jmx.enabled=false
# Lazy-init beans that aren't needed at startup (faster boot)
spring.main.lazy-initialization=false
