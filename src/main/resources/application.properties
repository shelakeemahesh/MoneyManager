# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/moneymanager?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:moneymanager}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Strong@123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Server
server.port=${PORT:8080}
server.servlet.context-path=/api/v1.0

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# App Base URL (used in email links)
app.base-url=${APP_BASE_URL:http://localhost:8080/api/v1.0}

# JWT
app.jwt.secret=${APP_JWT_SECRET:money-manager-super-secret-jwt-key-256-bits-long-enough-for-hs256}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:604800000}

# Email configuration (Brevo SMTP)
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_USERNAME}
spring.mail.password=${BREVO_PASSWORD}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.from=${BREVO_USERNAME:noreply@example.com}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# SQL logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE