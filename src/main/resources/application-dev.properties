# Development-only overrides.
# Activate with: spring.profiles.active=dev
# (or SPRING_PROFILES_ACTIVE=dev in your local .env)
#
# NEVER set this profile in production — bind-parameter logging
# will print passwords, JWTs, and other PII in plain text.

# Show SQL queries in console (readable format)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# More verbose app-level logging
logging.level.in.maheshshelakee.moneymanager=DEBUG
